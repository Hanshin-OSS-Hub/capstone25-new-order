version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: auth_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '1234'
      MYSQL_DATABASE: 'auth_db'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: flask_app
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=db
    depends_on:
      - db

volumes:
  mysql_data:
