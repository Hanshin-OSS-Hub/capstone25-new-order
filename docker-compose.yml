version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: auth_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"

  web:
    build: ./backend
    container_name: flask_app
    restart: always
    ports:
      - "5001:5001"
    environment:
      DB_PASSWORD: 1234
      JWT_SECRET: sungho_secret_key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - db
